<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D粒子手势互动</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
  #canvas3d { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
  #video {
    position: fixed; bottom: 16px; right: 16px;
    width: 160px; height: 120px; border-radius: 10px;
    border: 1px solid rgba(0,255,200,0.3);
    object-fit: cover; transform: scaleX(-1); opacity: 0.75; z-index: 10;
  }
  #overlay-canvas {
    position: fixed; bottom: 16px; right: 16px;
    width: 160px; height: 120px; border-radius: 10px;
    z-index: 11; transform: scaleX(-1); pointer-events: none;
  }
  #ui {
    position: fixed; top: 16px; left: 16px; z-index: 20;
    color: rgba(0,255,200,0.85); font-size: 13px; line-height: 2;
    text-shadow: 0 0 10px rgba(0,255,200,0.5);
  }
  #ui h1 { font-size: 17px; color: #fff; letter-spacing: 3px; margin-bottom: 6px;
    text-shadow: 0 0 20px rgba(0,255,200,0.9); }
  #gesture-badge {
    margin-top: 4px; padding: 4px 10px; border-radius: 20px;
    background: rgba(0,255,200,0.12); border: 1px solid rgba(0,255,200,0.3);
    font-size: 13px; color: #00ffc8; display: inline-block;
    transition: all 0.3s;
  }
  #camBtn {
    position: fixed; top: 16px; right: 16px; z-index: 20;
    background: rgba(0,255,200,0.1); color: #00ffc8;
    border: 1px solid rgba(0,255,200,0.4); border-radius: 8px;
    padding: 7px 15px; cursor: pointer; font-size: 12px;
    font-family: 'Courier New', monospace; transition: all 0.2s;
  }
  #camBtn:hover { background: rgba(0,255,200,0.25); }
  #loading {
    position: fixed; inset: 0; background: #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100; color: #fff; gap: 16px; font-size: 13px; letter-spacing: 2px;
  }
  .loader {
    width: 38px; height: 38px;
    border: 2px solid rgba(0,255,200,0.2);
    border-top-color: #00ffc8;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #tips {
    position: fixed; bottom: 16px; left: 16px; z-index: 20;
    color: rgba(255,255,255,0.28); font-size: 10px; line-height: 2;
  }
  #shockwave-ring {
    position: fixed; pointer-events: none; z-index: 5;
    border-radius: 50%; border: 2px solid rgba(0,255,200,0.6);
    display: none; transform: translate(-50%, -50%);
  }
</style>
</head>
<body>
<div id="loading"><div class="loader"></div><div id="load-text">正在加载手势模型...</div></div>
<canvas id="canvas3d"></canvas>
<video id="video" autoplay muted playsinline></video>
<canvas id="overlay-canvas"></canvas>
<div id="shockwave-ring"></div>

<div id="ui">
  <h1>✦ PARTICLE FIELD</h1>
  <div>粒子：<span id="count">15000</span></div>
  <div>手部：<span id="hand-status">等待中</span></div>
  <div id="gesture-badge">待机中</div>
</div>

<button id="camBtn" onclick="toggleCam()">📷 关闭摄像头</button>

<div id="tips">
  ✋ 张开手 → 排斥爆炸<br>
  ✊ 握拳 &nbsp;&nbsp;→ 聚拢吸引<br>
  ✌️ 比耶 &nbsp;&nbsp;→ 粒子分裂<br>
  ☝️ 单指 &nbsp;&nbsp;→ 指尖流动<br>
  🌀 旋转 &nbsp;&nbsp;→ 粒子跟转<br>
  👐 双手推→ 冲击波
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script type="module">
import 'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js';
import 'https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js';
const Hands = window.Hands;
const Camera = window.Camera;

// ── THREE SETUP ──
const canvas = document.getElementById('canvas3d');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x000000);
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.006);
const cam3d = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
cam3d.position.z = 80;

// ── PARTICLES ──
const N = 15000;
const pos = new Float32Array(N * 3);
const vel = new Float32Array(N * 3);
const ori = new Float32Array(N * 3);
const col = new Float32Array(N * 3);
const sz  = new Float32Array(N);

const palette = [
  [0.0,1.0,1.0],[0.0,0.6,1.0],[0.4,0.0,1.0],
  [0.0,1.0,0.5],[1.0,1.0,1.0],[0.0,0.8,1.0]
];

for (let i = 0; i < N; i++) {
  const r = 45 * Math.cbrt(Math.random());
  const t = Math.random()*Math.PI*2, p = Math.acos(2*Math.random()-1);
  const x = r*Math.sin(p)*Math.cos(t), y = r*Math.sin(p)*Math.sin(t), z = r*Math.cos(p);
  pos[i*3]=ori[i*3]=x; pos[i*3+1]=ori[i*3+1]=y; pos[i*3+2]=ori[i*3+2]=z;
  const c = palette[i % palette.length];
  col[i*3]=c[0]; col[i*3+1]=c[1]; col[i*3+2]=c[2];
  sz[i] = 1.5 + Math.random() * 2.5;
}

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
geo.setAttribute('size',     new THREE.BufferAttribute(sz, 1));

const mat = new THREE.ShaderMaterial({
  uniforms: { time: { value: 0 } },
  vertexShader: `
    attribute float size; varying vec3 vColor; varying float vA;
    uniform float time;
    void main() {
      vColor = vec3(color.r, color.g, color.b);
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      vA = smoothstep(150.0, 5.0, length(mv.xyz));
      float pulse = 1.0 + 0.25 * sin(time * 2.0 + position.x * 0.5);
      gl_PointSize = size * pulse * (600.0 / -mv.z);
      gl_Position = projectionMatrix * mv;
    }`,
  fragmentShader: `
    varying vec3 vColor; varying float vA;
    void main() {
      vec2 uv = gl_PointCoord - 0.5;
      float d = length(uv);
      if (d > 0.5) discard;
      float core = exp(-d * 8.0);
      float glow = exp(-d * 3.0) * 0.6;
      float alpha = (core + glow) * vA;
      vec3 bright = vColor + vec3(core * 0.9);
      gl_FragColor = vec4(bright, alpha);
    }`,
  transparent: true, depthWrite: false,
  blending: THREE.AdditiveBlending, vertexColors: true,
});

const pts = new THREE.Points(geo, mat);
scene.add(pts);

// ── GESTURE STATE ──
let handsData = [];
let shockwaveActive = false;
let shockwaveTime = 0;
let lastTwoHandDist = 0;
let rotationAngle = 0;

// ── GESTURE DETECTION ──
function fingerExtended(lm, tip, pip) { return lm[tip].y < lm[pip].y; }

function detectGesture(lm) {
  const f1 = fingerExtended(lm,8,6);
  const f2 = fingerExtended(lm,12,10);
  const f3 = fingerExtended(lm,16,14);
  const f4 = fingerExtended(lm,20,18);
  const thumb = lm[4].x < lm[3].x; // rough

  const extCount = [f1,f2,f3,f4].filter(Boolean).length;

  // 单指：只有食指伸出
  if (f1 && !f2 && !f3 && !f4) return 'point';
  // 比耶：食指+中指
  if (f1 && f2 && !f3 && !f4) return 'peace';
  // 张开：3指以上
  if (extCount >= 3) return 'open';
  // 握拳
  return 'fist';
}

function getFingerTip(lm) {
  // 食指指尖坐标转场景坐标
  return {
    x: (lm[8].x - 0.5) * 120,
    y: -(lm[8].y - 0.5) * 80,
    z: -lm[8].z * 100
  };
}

function getWrist(lm) {
  return {
    x: (lm[0].x - 0.5) * 120,
    y: -(lm[0].y - 0.5) * 80,
    z: -lm[0].z * 100
  };
}

function getPalmRotation(lm) {
  // 手腕到中指根部的向量角度
  const dx = lm[9].x - lm[0].x;
  const dy = lm[9].y - lm[0].y;
  return Math.atan2(dy, dx);
}

// ── OVERLAY ──
const video = document.getElementById('video');
const oc = document.getElementById('overlay-canvas');
const octx = oc.getContext('2d');
oc.width = 160; oc.height = 120;
const badge = document.getElementById('gesture-badge');
const hsEl  = document.getElementById('hand-status');

const gestureLabels = {
  open:  '✋ 张开手 → 排斥爆炸',
  fist:  '✊ 握拳 → 聚拢吸引',
  peace: '✌️ 比耶 → 粒子分裂',
  point: '☝️ 单指 → 指尖流动',
  two:   '👐 双手 → 冲击波',
  rotate:'🌀 旋转手掌 → 粒子旋转',
};

const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}`
});
hands.setOptions({ maxNumHands:2, modelComplexity:1, minDetectionConfidence:0.7, minTrackingConfidence:0.5 });

hands.onResults(results => {
  octx.clearRect(0,0,160,120);
  handsData = [];

  if (!results.multiHandLandmarks?.length) {
    hsEl.textContent = '未检测到'; badge.textContent = '待机中';
    lastTwoHandDist = 0; return;
  }

  hsEl.textContent = `${results.multiHandLandmarks.length}只手`;
  const lms = results.multiHandLandmarks;

  // 双手冲击波检测
  if (lms.length === 2) {
    const w0 = lms[0][0], w1 = lms[1][0];
    const dx = w0.x - w1.x, dy = w0.y - w1.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (lastTwoHandDist > 0) {
      const delta = lastTwoHandDist - dist;
      if (delta > 0.15 && !shockwaveActive) {
        // 双手快速合拢 → 冲击波
        shockwaveActive = true;
        shockwaveTime = 0;
        badge.textContent = gestureLabels.two;
      }
    }
    lastTwoHandDist = dist;
  } else {
    lastTwoHandDist = 0;
  }

  lms.forEach((lm, idx) => {
    const gesture = detectGesture(lm);
    const wrist = getWrist(lm);
    const tip   = getFingerTip(lm);
    const palmRot = getPalmRotation(lm);

    handsData.push({ wrist, tip, gesture, palmRot, lm });

    if (!shockwaveActive) {
      badge.textContent = gestureLabels[gesture] || gesture;
    }

    // Draw skeleton
    const color = gesture === 'peace' ? '#ff6bff' :
                  gesture === 'point' ? '#ffdd00' :
                  gesture === 'open'  ? '#00ffc8' : '#ff6b9d';
    lm.forEach(p => {
      octx.beginPath();
      octx.arc(p.x*160, p.y*120, 2, 0, Math.PI*2);
      octx.fillStyle = color; octx.fill();
    });
    [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],
     [5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],
     [13,17],[17,18],[18,19],[19,20],[0,17]].forEach(([a,b]) => {
      octx.beginPath();
      octx.moveTo(lm[a].x*160, lm[a].y*120);
      octx.lineTo(lm[b].x*160, lm[b].y*120);
      octx.strokeStyle = color+'99'; octx.lineWidth=1; octx.stroke();
    });
  });
});

// ── MEDIAPIPE CAMERA ──
const mediaCam = new Camera(video, {
  onFrame: async () => { await hands.send({ image: video }); },
  width: 640, height: 480,
});
const loadEl  = document.getElementById('load-text');
const loadDiv = document.getElementById('loading');
mediaCam.start().then(() => {
  loadDiv.style.transition = 'opacity 0.5s';
  loadDiv.style.opacity = '0';
  setTimeout(() => loadDiv.style.display='none', 500);
}).catch(() => { loadEl.textContent = '❌ 请允许摄像头权限后刷新页面'; });

// ── CAM TOGGLE ──
let camOn = true;
window.toggleCam = function() {
  if (camOn) {
    mediaCam.stop(); video.style.display='none'; oc.style.display='none';
    document.getElementById('camBtn').textContent = '📷 开启摄像头';
  } else {
    mediaCam.start(); video.style.display='block'; oc.style.display='block';
    document.getElementById('camBtn').textContent = '📷 关闭摄像头';
  }
  camOn = !camOn;
};

// ── ANIMATE ──
let last = performance.now();

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt  = Math.min((now - last)/1000, 0.05);
  last = now;
  const t = now / 1000;

  // Shockwave update
  if (shockwaveActive) {
    shockwaveTime += dt;
    if (shockwaveTime > 1.2) shockwaveActive = false;
  }

  for (let i = 0; i < N; i++) {
    const ix=i*3, iy=ix+1, iz=ix+2;
    let px=pos[ix], py=pos[iy], pz=pos[iz];
    let vx=vel[ix], vy=vel[iy], vz=vel[iz];

    // Spring to origin
    vx += (ori[ix]-px)*0.018;
    vy += (ori[iy]-py)*0.018;
    vz += (ori[iz]-pz)*0.018;

    // Turbulence
    vx += Math.sin(py*0.08 + t*0.7) * 0.015;
    vy += Math.cos(px*0.08 + t*0.5) * 0.015;

    // ── GESTURE FORCES ──
    handsData.forEach(({ wrist, tip, gesture, palmRot }) => {
      const dx=px-wrist.x, dy=py-wrist.y, dz=pz-wrist.z;
      const dist = Math.sqrt(dx*dx+dy*dy+dz*dz)+0.001;

      if (gesture === 'open') {
        // 张开手：排斥
        const r = 38;
        if (dist < r) {
          const f = (1-dist/r);
          vx += dx/dist*f*4.5*dt*60;
          vy += dy/dist*f*4.5*dt*60;
          vz += dz/dist*f*2.0*dt*60;
        }

      } else if (gesture === 'fist') {
        // 握拳：吸引
        const r = 28;
        if (dist < r) {
          const f = (1-dist/r);
          vx -= dx/dist*f*3.0*dt*60;
          vy -= dy/dist*f*3.0*dt*60;
          vz -= dz/dist*f*1.5*dt*60;
        }

      } else if (gesture === 'point') {
        // 单指：粒子跟随指尖流动
        const tdx=px-tip.x, tdy=py-tip.y, tdz=pz-tip.z;
        const td = Math.sqrt(tdx*tdx+tdy*tdy+tdz*tdz)+0.001;
        const r = 22;
        if (td < r) {
          const f = (1-td/r);
          // 沿切线方向流动（旋涡）
          vx += (-tdy/td) * f * 3.5 * dt*60;
          vy += (tdx/td)  * f * 3.5 * dt*60;
          vz -= tdz/td    * f * 1.5 * dt*60;
        }

      } else if (gesture === 'peace') {
        // 比耶：两束分裂（沿X轴左右各一束）
        const r = 35;
        if (dist < r) {
          const f = (1-dist/r);
          // 左半粒子向左，右半粒子向右
          const side = px > wrist.x ? 1 : -1;
          vx += side * f * 5.0 * dt*60;
          vy -= dy/dist * f * 1.5 * dt*60;
        }
      }

      // 手掌旋转：检测palmRot变化，带动周围粒子旋转
      const rotR = 32;
      if (dist < rotR) {
        const f = (1-dist/rotR) * 0.6;
        const angle = palmRot + t * 0.0; // 用实时角度
        vx += (-dy/dist) * f * Math.sin(palmRot) * 2.5 * dt*60;
        vy += (dx/dist)  * f * Math.cos(palmRot) * 2.5 * dt*60;
      }
    });

    // 冲击波：从中心向外扩散
    if (shockwaveActive) {
      const wdist = Math.sqrt(px*px+py*py+pz*pz)+0.001;
      const waveR = shockwaveTime * 60;
      const diff  = Math.abs(wdist - waveR);
      if (diff < 12) {
        const f = (1 - diff/12) * (1 - shockwaveTime/1.2);
        vx += (px/wdist) * f * 8.0 * dt*60;
        vy += (py/wdist) * f * 8.0 * dt*60;
        vz += (pz/wdist) * f * 4.0 * dt*60;
      }
    }

    // Damping
    vx *= 0.91; vy *= 0.91; vz *= 0.92;

    pos[ix]=px+vx*dt*60; pos[iy]=py+vy*dt*60; pos[iz]=pz+vz*dt*60;
    vel[ix]=vx; vel[iy]=vy; vel[iz]=vz;
  }

  geo.attributes.position.needsUpdate = true;
  if (!handsData.length) pts.rotation.y += 0.0004;
  mat.uniforms.time.value = t;
  renderer.render(scene, cam3d);
}
animate();

window.addEventListener('resize', () => {
  cam3d.aspect = innerWidth/innerHeight;
  cam3d.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
