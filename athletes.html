<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>运动员档案 — APEX ARENA</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg-deep: #08080e; --bg-surface: #f0f0f5; --bg-elevated: #f8f8fc;
  --text-primary: #1c1c22; --text-secondary: #5a5860; --text-muted: #94929a;
  --accent-flame: #ff3b1f; --accent-gold: #ffb11b; --accent-ember: #e85d04;
  --border-subtle: rgba(0,0,0,0.08); --border-active: rgba(0,0,0,0.15);
  --font-display: 'Impact','Haettenschweiler','Arial Narrow Bold',sans-serif;
  --font-body: 'Segoe UI',system-ui,-apple-system,sans-serif;
  --font-mono: 'Cascadia Code','Fira Code','Consolas',monospace;
  --transition-fast: 150ms cubic-bezier(0.4,0,0.2,1);
  --transition-smooth: 400ms cubic-bezier(0.16,1,0.3,1);
  --transition-spring: 500ms cubic-bezier(0.34,1.56,0.64,1);
}
html { scroll-behavior: smooth; font-size: 16px; }
body {
  font-family: var(--font-body);
  background:
    radial-gradient(ellipse 100% 80% at 25% 15%, rgba(255,255,255,0.7) 0%, transparent 52%),
    radial-gradient(ellipse 90% 90% at 72% 45%, rgba(248,248,252,0.45) 0%, transparent 50%),
    radial-gradient(ellipse 70% 85% at 45% 78%, rgba(235,235,242,0.35) 0%, transparent 45%),
    linear-gradient(172deg, #cfcfe0 0%, #dedee8 40%, #c4c4d6 100%);
  color: var(--text-primary);
  line-height: 1.6; overflow-x: hidden; -webkit-font-smoothing: antialiased;
}
canvas#bg-canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }

/* Nav */
.nav {
  position:fixed; top:0; left:0; right:0; z-index:100; padding:0 2rem; height:64px;
  display:flex; align-items:center; justify-content:space-between;
  background: linear-gradient(180deg, rgba(240,240,245,0.9) 40%, rgba(240,240,245,0) 100%);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}
.nav-logo { font-family:var(--font-display); font-size:1.5rem; letter-spacing:0.15em; color:var(--text-primary); text-decoration:none; text-transform:uppercase; }
.nav-logo span { color:var(--accent-flame); }
.nav-links { display:flex; gap:2rem; list-style:none; }
.nav-links a { color:var(--text-secondary); text-decoration:none; font-size:0.85rem; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; position:relative; padding:0.25rem 0; transition:color var(--transition-fast); }
.nav-links a::after { content:''; position:absolute; bottom:0; left:0; width:0; height:2px; background:var(--accent-flame); transition:width var(--transition-smooth); }
.nav-links a:hover,.nav-links a.active { color:var(--text-primary); }
.nav-links a:hover::after,.nav-links a.active::after { width:100%; }

/* Page Header */
.page-header { position:relative; z-index:1; padding:8rem 2rem 3rem; }
.page-tag { font-family:var(--font-mono); font-size:0.7rem; letter-spacing:0.25em; color:var(--accent-flame); text-transform:uppercase; display:block; margin-bottom:0.75rem; }
.page-title { font-family:var(--font-display); font-size:clamp(2.5rem,5vw,4rem); text-transform:uppercase; letter-spacing:-0.01em; line-height:1.05; }
.page-title span { background:linear-gradient(135deg,var(--accent-flame),var(--accent-gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }

/* Filters */
.filters { position:relative; z-index:1; padding:0 2rem 2rem; display:flex; gap:0.75rem; flex-wrap:wrap; }
.filter-btn {
  padding:0.5rem 1.25rem; font-size:0.75rem; letter-spacing:0.08em; text-transform:uppercase;
  border:1px solid var(--border-subtle); background:transparent; color:var(--text-secondary);
  cursor:pointer; transition:all var(--transition-fast); font-family:var(--font-body);
  clip-path: polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%);
}
.filter-btn:hover { border-color:var(--border-active); color:var(--text-primary); }
.filter-btn.active { background:var(--accent-flame); border-color:var(--accent-flame); color:#fff; }

/* Athlete Grid */
.athletes-grid {
  position:relative; z-index:1; padding:0 2rem 4rem;
  display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:1.25rem;
}
.athlete-card {
  background:rgba(255,255,255,0.5); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border:1px solid rgba(0,0,0,0.06);
  overflow:hidden; cursor:pointer; transition:all var(--transition-smooth);
  position:relative;
}
.athlete-card:hover {
  transform: translateY(-6px);
  border-color: var(--border-active);
  box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 0 0 1px rgba(255,59,31,0.15);
}
.athlete-card::before {
  content:''; position:absolute; top:0; left:0; width:100%; height:3px;
  background:linear-gradient(90deg, var(--accent-flame), var(--accent-gold));
  transform:scaleX(0); transform-origin:left; transition:transform var(--transition-smooth); z-index:2;
}
.athlete-card:hover::before { transform:scaleX(1); }
.athlete-img {
  width:100%; height:320px; position:relative; overflow:hidden;
  background: linear-gradient(135deg, #e0e0ec 0%, #d4d4e0 100%);
}
.athlete-img img {
  width:100%; height:100%; object-fit:cover;
  transition: transform 0.6s cubic-bezier(0.16,1,0.3,1);
}
.athlete-card:hover .athlete-img img { transform:scale(1.08); }
.athlete-rank {
  position:absolute; top:1rem; right:1rem;
  font-family:var(--font-display); font-size:2rem; color:rgba(0,0,0,0.08);
  transition:all var(--transition-smooth);
}
.athlete-card:hover .athlete-rank { color:rgba(255,177,27,0.3); transform:scale(1.2); }
.athlete-info { padding:1.5rem; }
.athlete-name { font-family:var(--font-display); font-size:1.35rem; text-transform:uppercase; letter-spacing:0.03em; margin-bottom:0.25rem; }
.athlete-sport { font-family:var(--font-mono); font-size:0.65rem; letter-spacing:0.15em; color:var(--accent-flame); text-transform:uppercase; }
.athlete-stats { display:flex; gap:1.5rem; margin-top:1rem; padding-top:1rem; border-top:1px solid var(--border-subtle); }
.athlete-stat-val { font-family:var(--font-display); font-size:1.15rem; color:var(--accent-gold); }
.athlete-stat-lbl { font-size:0.65rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; }

/* Footer */
.footer { position:relative; z-index:1; padding:3rem 2rem; background:rgba(255,255,255,0.45); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); border-top:1px solid rgba(0,0,0,0.06); display:flex; justify-content:space-between; align-items:center; font-size:0.75rem; color:var(--text-muted); }

@media (max-width:640px) {
  .nav { padding:0 1rem; } .nav-links { display:none; }
  .page-header { padding:7rem 1rem 2rem; } .filters { padding:0 1rem 1.5rem; }
  .athletes-grid { padding:0 1rem 3rem; grid-template-columns:1fr; }
}

@media (prefers-reduced-motion:reduce) {
  *,*::before,*::after { animation-duration:0.01ms!important; animation-iteration-count:1!important; transition-duration:0.01ms!important; }
}

/* ========== Dark Theme Overrides ========== */
[data-theme="dark"] {
  --bg-deep: #08080e; --bg-surface: #050508; --bg-elevated: #0a0a10;
  --text-primary: #e8e6e3; --text-secondary: #9d9a95; --text-muted: #5c5a56;
  --border-subtle: rgba(255,255,255,0.04); --border-active: rgba(255,255,255,0.08);
}
[data-theme="dark"] body {
  background:
    linear-gradient(180deg, #000000 0%, #08080c 50%, #020204 100%);
}
[data-theme="dark"] .nav {
  background: linear-gradient(180deg, rgba(0,0,0,0.95) 40%, rgba(0,0,0,0) 100%);
}
[data-theme="dark"] .athlete-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
}
[data-theme="dark"] .athlete-card:hover {
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,59,31,0.1);
}
[data-theme="dark"] .athlete-img {
  background: linear-gradient(135deg, var(--bg-elevated) 0%, var(--bg-deep) 100%);
}
[data-theme="dark"] .athlete-rank {
  color: rgba(255,255,255,0.15);
}
[data-theme="dark"] .footer {
  background: var(--bg-surface);
  border-top: 1px solid var(--border-subtle);
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
}
[data-theme="dark"] .leaderboard li:hover {
  background: rgba(255,255,255,0.02);
}

/* ========== Pull-Chain Theme Switch ========== */
.pull-chain {
  position: fixed;
  right: 36px;
  top: 0;
  z-index: 200;
  width: 32px;
  height: 140px;
  cursor: grab;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
}
.pull-chain:active { cursor: grabbing; }
.pull-chain.dark { /* dark mode marker */ }

.pull-line {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 2px;
  height: 100px;
  background: #aaa;
  border-radius: 1px;
  transition: background 0.35s ease;
  pointer-events: none;
}
.pull-chain.dark .pull-line {
  background: rgba(255,255,255,0.3);
}

.pull-handle {
  position: absolute;
  top: 100px;
  left: 50%;
  transform: translate(-50%, 0);
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #f0f0f0;
  border: 2px solid #ccc;
  box-shadow:
    0 2px 6px rgba(0,0,0,0.15),
    0 0 0 1px rgba(0,0,0,0.04),
    inset 0 1px 0 rgba(255,255,255,0.7);
  transition:
    background 0.35s ease,
    border-color 0.35s ease,
    box-shadow 0.35s ease,
    transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
}
.pull-handle::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #888;
  transition: background 0.35s ease;
}

.pull-chain.dark .pull-handle {
  background: #222;
  border-color: #333;
  box-shadow:
    0 2px 6px rgba(0,0,0,0.35),
    0 0 0 1px rgba(255,255,255,0.06),
    inset 0 1px 0 rgba(255,255,255,0.1);
}
.pull-chain.dark .pull-handle::after {
  background: #bbb;
}

/* Threshold hint: ring changes color */
.pull-handle.near-threshold {
  border-color: var(--accent-gold);
  box-shadow:
    0 2px 8px rgba(255,177,27,0.35),
    0 0 0 1px rgba(255,177,27,0.2),
    inset 0 1px 0 rgba(255,255,255,0.7);
}
.pull-chain.dark .pull-handle.near-threshold {
  border-color: var(--accent-gold);
  box-shadow:
    0 2px 8px rgba(255,177,27,0.45),
    0 0 0 1px rgba(255,177,27,0.25),
    inset 0 1px 0 rgba(255,255,255,0.1);
}

</style>

<script>
// ========== Pull-Chain Theme Switch ==========
(function() {
  const KEY = 'theme';
  const chain = document.getElementById('pullChain');
  const html = document.documentElement;

  if (!chain) return;

  const line = chain.querySelector('.pull-line');
  const handle = chain.querySelector('.pull-handle');
  const BASE_LINE_HEIGHT = 100;   // px, resting line height
  const MAX_PULL = 90;            // max additional px on pull
  const THRESHOLD = 55;           // px to trigger theme switch

  let isDragging = false;
  let startY = 0;
  let currentTheme = 'light';
  let pullDistance = 0;

  function setTheme(t) {
    currentTheme = t;
    html.setAttribute('data-theme', t);
    if (t === 'dark') {
      chain.classList.add('dark');
    } else {
      chain.classList.remove('dark');
    }
    localStorage.setItem(KEY, t);
  }

  const saved = localStorage.getItem(KEY) || 'light';
  setTheme(saved);

  function updateVisual(d) {
    pullDistance = d;
    // Update line height
    if (line) line.style.height = (BASE_LINE_HEIGHT + d) + 'px';
    // Update handle position
    if (handle) {
      handle.style.transition = 'none';
      handle.style.transform = 'translate(-50%, ' + d + 'px)';
    }
    // Threshold hint
    if (d > THRESHOLD) {
      handle && handle.classList.add('near-threshold');
    } else {
      handle && handle.classList.remove('near-threshold');
    }
  }

  function snapBack() {
    if (handle) {
      handle.style.transition = 'transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
      handle.style.transform = 'translate(-50%, 0)';
    }
    if (line) {
      line.style.transition = 'height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
      line.style.height = BASE_LINE_HEIGHT + 'px';
    }
    handle && handle.classList.remove('near-threshold');
    pullDistance = 0;
  }

  function toggleTheme() {
    setTheme(currentTheme === 'dark' ? 'light' : 'dark');
  }

  // Click to toggle (quick tap)
  chain.addEventListener('click', function(e) {
    if (isDragging) return;
    toggleTheme();
  });

  // --- Drag: mouse ---
  chain.addEventListener('mousedown', function(e) {
    isDragging = true;
    startY = e.clientY;
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    const dy = e.clientY - startY;
    // Apply elastic resistance: the further you pull, the harder it gets
    const raw = Math.max(0, dy);
    const elastic = raw * (1 - raw / (MAX_PULL * 2.5));
    const clamped = Math.min(elastic, MAX_PULL);
    updateVisual(clamped);
  });

  document.addEventListener('mouseup', function(e) {
    if (!isDragging) return;
    isDragging = false;

    if (pullDistance > THRESHOLD) {
      toggleTheme();
    }
    snapBack();
  });

  // --- Drag: touch ---
  chain.addEventListener('touchstart', function(e) {
    isDragging = true;
    startY = e.touches[0].clientY;
    // Don't preventDefault here to allow click fallback
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (!isDragging) return;
    const dy = e.touches[0].clientY - startY;
    const raw = Math.max(0, dy);
    const elastic = raw * (1 - raw / (MAX_PULL * 2.5));
    const clamped = Math.min(elastic, MAX_PULL);
    updateVisual(clamped);
  }, { passive: true });

  document.addEventListener('touchend', function(e) {
    if (!isDragging) return;
    isDragging = false;

    if (pullDistance > THRESHOLD) {
      toggleTheme();
    }
    snapBack();
  });

  // Prevent text selection during drag
  chain.addEventListener('dragstart', function(e) {
    e.preventDefault();
  });
})();
</script>

</body>
